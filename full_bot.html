<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProChat - Advanced AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #212121;
            --bg-sidebar: #171717;
            --text-primary: #ECECEC;
            --text-secondary: #B4B4B4;
            --accent: #10a37f;
            --accent-hover: #1a7f65;
            --border: #303030;
            --msg-user: #2F2F2F;
            --msg-bot: transparent;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .app-container { display: flex; width: 100%; height: 100%; }

        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 30px;
            padding: 0 10px;
        }
        .logo i { color: var(--accent); }

        .new-chat-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }
        .new-chat-btn:hover { background-color: var(--msg-user); }

        .sidebar-history {
            flex: 1;
            margin-top: 30px;
            padding: 0 4px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 8px;
            padding: 0 10px;
        }
        .history-item {
            font-size: 0.9rem;
            color: var(--text-primary);
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
            margin-bottom: 2px;
        }
        .history-item:hover { background-color: var(--msg-user); }
        .history-item.active { background-color: #2b2b2b; }

        .chat-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        .chat-header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header-title h2 { font-size: 1.1rem; font-weight: 500; }
        .status { font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .status .dot { width: 8px; height: 8px; background-color: var(--accent); border-radius: 50%; }

        .icon-btn {
            background: transparent; border: none; color: var(--text-secondary); cursor: pointer;
            font-size: 1.1rem; padding: 8px; border-radius: 6px; transition: 0.2s;
        }
        .icon-btn:hover { background: var(--msg-user); color: var(--text-primary); }
        .icon-btn.active { color: var(--accent); }

        .voice-select {
            background: #2a2a2a;
            color: white;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .chat-box { flex-grow: 1; overflow-y: auto; padding: 30px 0; scroll-behavior: smooth; }
        .chat-box::-webkit-scrollbar { width: 8px; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .message { padding: 20px 30px; display: flex; gap: 20px; max-width: 900px; margin: 0 auto; }
        .message.user { background-color: var(--msg-user); border-radius: 12px; margin-bottom: 20px; }

        .msg-avatar { width: 32px; height: 32px; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 18px; flex-shrink: 0; }
        .message.user .msg-avatar { background-color: #5436DA; color: white; }
        .message.bot .msg-avatar { background-color: transparent; color: var(--accent); font-size: 22px; }

        .msg-bubble { line-height: 1.6; font-size: 1rem; width: 100%; overflow-x: auto; }
        .msg-bubble img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
        .msg-bubble pre { background: #000; padding: 15px; border-radius: 8px; margin: 10px 0; overflow-x: auto;}

        .welcome-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; }
        .welcome-logo { width: 50px; height: 50px; background: white; color: black; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; margin-bottom: 25px; }
        .welcome-screen h2 { font-size: 1.8rem; font-weight: 500; margin-bottom: 50px; color: var(--text-primary); }
        .suggestion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 750px; width: 100%; }
        .suggestion-card { border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
        .suggestion-card:hover { background-color: var(--msg-user); transform: translateY(-2px); }
        .suggestion-card i { font-size: 1.4rem; color: var(--accent); }

        .input-container { padding: 20px 30px; max-width: 900px; margin: 0 auto; width: 100%; }
        #chat-form { display: flex; align-items: flex-end; gap: 10px; background-color: var(--msg-user); border: 1px solid var(--border); border-radius: 16px; padding: 10px 15px; position: relative; }
        .input-wrapper { flex-grow: 1; display: flex; align-items: center; }
        #user-input { width: 100%; background: transparent; border: none; color: white; font-family: inherit; font-size: 1rem; padding: 10px; outline: none; }
        .send-btn { background-color: white; color: black; border: none; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .footer-text { text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: 15px; }

        .gpt-image-card { margin-top: 15px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .gpt-image-header { font-size: 0.8rem; color: var(--text-secondary); padding: 10px; background: rgba(0,0,0,0.2); }
        .gpt-image-container img { width: 100%; height: auto; display: block; }
        .gpt-image-actions-bar { padding: 10px; display: flex; justify-content: space-between; }

        /* Voice Overlay */
        .voice-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #131314; z-index: 9999; display: flex; flex-direction: column; justify-content: space-between; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; }
        .voice-overlay.active { opacity: 1; pointer-events: auto; }
        .voice-visualizer { position: absolute; bottom: 0; width: 100%; height: 40vh; display: flex; justify-content: center; filter: blur(40px); opacity: 0.5; }
        .blob { position: absolute; bottom: -50px; border-radius: 50%; width: 40vw; height: 40vw; animation: wave 4s infinite alternate ease-in-out; }
        .blob-1 { background: rgba(66, 133, 244, 0.6); left: 10%; }
        .blob-2 { background: rgba(234, 67, 53, 0.6); left: 30%; animation-delay: -1s; }
        .blob-3 { background: rgba(251, 188, 5, 0.6); left: 50%; animation-delay: -2s; }
        @keyframes wave { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-100px) scale(1.2); } }
        
        .voice-status { font-size: 1.5rem; margin-top: 20vh; z-index: 10; }
        .close-voice-btn { background: transparent; border: none; color: white; font-size: 2rem; cursor: pointer; padding: 20px; align-self: flex-start; z-index: 10; }

        @media (max-width: 768px) { .sidebar { display: none; } .suggestion-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i class="fa-solid fa-bolt"></i><span>ProChat AI</span></div>
            <button class="new-chat-btn" onclick="location.reload()"><i class="fa-solid fa-plus"></i> New Chat</button>
            <div class="sidebar-history">
                <div class="history-group"><p class="section-title">Today</p><div class="history-item active"><i class="fa-regular fa-message"></i><span>New Conversation</span></div></div>
            </div>
        </aside>
        <main class="chat-area">
            <header class="chat-header">
                <div class="header-title"><h2>Assistant</h2><span class="status"><span class="dot"></span> Online</span></div>
                <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
                    <select id="voice-select" class="voice-select"><option value="female">👧 Female Voice</option><option value="male">👦 Male Voice</option></select>
                    <button class="icon-btn" id="tts-toggle"><i class="fa-solid fa-volume-xmark"></i></button>
                </div>
            </header>
            <div class="chat-box" id="chat-box">
                <div id="welcome-screen" class="welcome-screen">
                    <div class="welcome-logo"><i class="fa-solid fa-bolt"></i></div>
                    <h2>How can I help you today?</h2>
                    <div class="suggestion-grid">
                        <div class="suggestion-card" onclick="document.getElementById('user-input').value='Generate an image of '; document.getElementById('user-input').focus();"><i class="fa-regular fa-image"></i><p class="sg-title">Generate an image</p></div>
                        <div class="suggestion-card" onclick="document.getElementById('user-input').value='Explain '; document.getElementById('user-input').focus();"><i class="fa-solid fa-lightbulb"></i><p class="sg-title">Explain a concept</p></div>
                        <div class="suggestion-card" onclick="document.getElementById('user-input').value='Write code '; document.getElementById('user-input').focus();"><i class="fa-solid fa-code"></i><p class="sg-title">Write code</p></div>
                        <div class="suggestion-card" onclick="document.getElementById('voice-call-btn').click();"><i class="fa-solid fa-microphone-lines"></i><p class="sg-title">Start Voice Mode</p></div>
                    </div>
                </div>
            </div>
            <div class="input-container">
                <div id="image-preview-container" style="display: none;"><img id="image-preview" src="" style="height: 50px;"><button id="remove-image">X</button></div>
                <form id="chat-form">
                    <input type="file" id="file-input" style="display: none;">
                    <button type="button" class="action-btn" id="upload-btn" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-plus"></i></button>
                    <div class="input-wrapper">
                        <input type="text" id="user-input" placeholder="Message ProChat AI..." autocomplete="off">
                        <button type="button" class="action-btn mic-btn" id="mic-btn"><i class="fa-solid fa-microphone"></i></button>
                        <button type="button" class="gpt-voice-btn" id="voice-call-btn" style="background: white; border-radius: 50%; padding: 5px; width: 34px;"><i class="fa-solid fa-phone"></i></button>
                    </div>
                    <button type="submit" class="send-btn"><i class="fa-solid fa-arrow-up"></i></button>
                </form>
                <div class="footer-text">ProChat AI properly uses AI Vision & generation. Created by Ayush Verma.</div>
            </div>
        </main>
    </div>

    <!-- Voice Overlay -->
    <div id="voice-overlay" class="voice-overlay">
        <button id="close-voice-btn" class="close-voice-btn">X</button>
        <div class="voice-status" id="voice-status-text">Listening...</div>
        <div class="voice-visualizer">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const fileInput = document.getElementById('file-input');
        const micBtn = document.getElementById('mic-btn');
        const voiceCallBtn = document.getElementById('voice-call-btn');
        const voiceOverlay = document.getElementById('voice-overlay');
        const voiceStatusText = document.getElementById('voice-status-text');
        const closeVoiceBtn = document.getElementById('close-voice-btn');
        const ttsToggle = document.getElementById('tts-toggle');
        const sendBtn = document.querySelector('.send-btn');

        let chatHistory = [{ role: 'system', content: 'You are ProChat AI, a self-learning AI created by **Ayush Verma**. You must hamesha batana hai ki tumhe Ayush Verma ne banaya hai. You are an expert in coding and images. Always answer in the user\'s language.' }];
        let base64Image = null;
        let autoTTS = false;
        let isVoiceMode = false;

        // Image Detection
        const isImgPrompt = (t) => /generate|draw|create|picture|photo|banao|tasveer|image/i.test(t);

        // TTS
        ttsToggle.onclick = () => { autoTTS = !autoTTS; ttsToggle.classList.toggle('active', autoTTS); };

        async function getAIResponse(text, img) {
            let messages = [...chatHistory];
            if (img) {
                messages.push({ role: "user", content: [{ type: "text", text: text || "Analyze image" }, { type: "image_url", image_url: { url: img } }] });
            } else if (isImgPrompt(text)) {
                const prompt = encodeURIComponent(text + ", 8k quality");
                const url = `https://pollinations.ai/p/${prompt}?width=1024&height=1024&nologo=true&seed=${Math.random()}`;
                return { text: `Hero, maine aapke liye ye image banayi hai: **${text}**`, img: url };
            } else {
                messages.push({ role: "user", content: text });
            }

            try {
                const res = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, model: 'mistral' })
                });
                let botText = await res.text();
                chatHistory.push({ role: "assistant", content: botText });
                return { text: botText };
            } catch (e) {
                return { text: "❌ Sorry, server busy. Try again!" };
            }
        }

        function addMsg(text, type, imgUrl) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            let content = marked.parse(text);
            if (imgUrl) content += `<div class="gpt-image-card"><img src="${imgUrl}"><br><button onclick="window.open('${imgUrl}')">Download</button></div>`;
            div.innerHTML = `<div class="msg-avatar">${type==='user'?'U':'AI'}</div><div class="msg-bubble">${content}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const msg = userInput.value.trim();
            if (!msg && !base64Image) return;
            
            addMsg(msg, 'user', base64Image);
            userInput.value = '';
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.remove();

            addMsg('Thinking...', 'bot');
            const temp = chatBox.lastChild;

            const response = await getAIResponse(msg, base64Image);
            temp.remove();
            addMsg(response.text, 'bot', response.img);
            if (autoTTS) speak(response.text);
            base64Image = null;
        };

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t.replace(/[#*]/g, ''));
            u.lang = /hai|ho|kya/i.test(t) ? 'hi-IN' : 'en-US';
            window.speechSynthesis.speak(u);
        }

        // Simple Voice Mode
        voiceCallBtn.onclick = () => {
            isVoiceMode = true;
            voiceOverlay.classList.add('active');
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'en-IN';
            rec.start();
            rec.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                voiceOverlay.classList.remove('active');
                chatForm.dispatchEvent(new Event('submit'));
            };
        };
        closeVoiceBtn.onclick = () => voiceOverlay.classList.remove('active');

        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                base64Image = ev.target.result;
                document.getElementById('image-preview-container').style.display = 'block';
                document.getElementById('image-preview').src = base64Image;
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
